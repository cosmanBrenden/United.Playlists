spring:
  datasource:
    # In-memory, fresh per test class. PostgreSQL compatibility mode so the SQL in
    # the migrations stays close to what a future hosted deployment would run.
    url: jdbc:h2:mem:uptest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 0

unitedplaylists:
  security:
    # Fixed test key. Only ever used against an in-memory database.
    token-key: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
    api-token: "test-api-token"
  oauth:
    redirect-uri: "http://127.0.0.1:8420/callback"
  spotify:
    enabled: true
    client-id: "test-spotify-client"
  # Off in tests: the scraper providers make live network calls, which must never
  # happen inside the suite. The live probe re-enables them by constructing directly.
  scraper:
    enabled: false
logging:
  level:
    dev.unitedplaylists: WARN
    org.springframework: WARN
