spring:
  application:
    name: unitedplaylists-backend

  datasource:
    # File-based H2 under the user's home. The Electron launcher overrides this to
    # the platform's real userData directory via UP_DATA_DIR.
    url: jdbc:h2:file:${UP_DATA_DIR:${user.home}/.unitedplaylists}/db;AUTO_SERVER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      # Flyway owns the schema. ddl-auto would silently disagree with it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Applied to the auto-configured RestClient.Builder every provider injects.
  # Not optional: the default is to wait forever, so one unresponsive service would
  # pin a search thread until the JVM restarts. The read timeout is deliberately
  # longer than the search fan-out timeout below, so SearchService is what gives up
  # first and can name the service that was slow.
  http:
    client:
      connect-timeout: 3s
      read-timeout: 10s

server:
  # Loopback only. The app is a local backend, not a server; binding wider would
  # expose the user's music library to their whole network.
  address: 127.0.0.1
  # 0 = pick a free port. A fixed port collides when two copies run, and a
  # predictable one is easier for a hostile local process to find. The chosen port
  # is printed at startup for the Electron launcher to read.
  port: ${UP_PORT:0}
  error:
    include-message: never
    include-stacktrace: never

unitedplaylists:
  security:
    # 32 random bytes, base64. Generated by the Electron launcher on first run and
    # stored in the OS keychain, not here. Startup fails if absent, by design:
    # falling back to plaintext tokens would be worse than not starting.
    token-key: ${UP_TOKEN_KEY:}
    # Shared secret Electron must send on every request. Generated per run if unset.
    api-token: ${UP_API_TOKEN:}

  oauth:
    # Loopback redirect, per RFC 8252 for native apps. The launcher substitutes the
    # real port. This exact URI must be registered in each service's dashboard.
    redirect-uri: ${UP_REDIRECT_URI:http://127.0.0.1:8420/callback}

  search:
    # Slightly under spring.http.client.read-timeout so a slow service is reported
    # as slow by name rather than surfacing as a generic client error.
    # There is no pool size: fan-out runs on virtual threads.
    provider-timeout: 8s

  # Client IDs below are startup fallbacks only. What the user enters in the app is
  # stored in the database and wins, so a normal user never needs these; they exist
  # for running from source, for CI, and for a packaged build that ships its own
  # registration.
  spotify:
    enabled: true
    # PKCE public client: this is not a secret, and Spotify does not treat it as one.
    client-id: ${UP_SPOTIFY_CLIENT_ID:}
    api-base-url: https://api.spotify.com
    auth-base-url: https://accounts.spotify.com

  # YouTube and SoundCloud need no configuration: they are reached anonymously through
  # NewPipe's extractor, with no API key, OAuth, or account.
  newpipe:
    # Extractor updates land here, in the same data dir as the database so the Electron
    # launcher can find them and put the newest on the classpath at the next start.
    cache-dir: ${UP_DATA_DIR:${user.home}/.unitedplaylists}/newpipe
    auto-update: true
    # The version compiled in, for update comparisons. Keep in step with the
    # <newpipe.version> in pom.xml — the running JVM cannot read a loader.path jar's
    # own version, so this is the reference point.
    bundled-version: v0.26.3

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    dev.unitedplaylists: INFO
